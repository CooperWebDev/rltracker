<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rocket League Stats Viewer</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">Coopers Rocket League Tracker</p>
      <h1>Tracked Epic Accounts</h1>
      <p class="hero-copy">Click any tab to review the current season, total stats, and rank images for each account.</p>
    </header>

    <div id="tabRow" class="tab-row"></div>

    <main class="content-panel">
      <div id="statusMessage" class="status-message"></div>
      <div id="profileContent" class="profile-content"></div>
    </main>
  </div>

  <script>
    const accountIds = ['CooperPanicked', 'CooperAdoresElla', 'CooperLovesElla', 'CooperNeedsElla'];
    let profiles = {};
    let activeAccount = accountIds[0];

    function setStatus(message) {
      const status = document.getElementById('statusMessage');
      status.textContent = message;
    }

    function renderTabs() {
      const tabRow = document.getElementById('tabRow');
      tabRow.innerHTML = '';

      accountIds.forEach((accountId) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `tab-button${accountId === activeAccount ? ' active' : ''}`;
        button.textContent = accountId;
        button.addEventListener('click', () => {
          activeAccount = accountId;
          renderTabs();
          renderProfile(activeAccount);
        });
        tabRow.appendChild(button);
      });
    }

    function drawPerformanceChart(chartData, chartTitle) {
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(function() {
        if (!chartData || chartData.length === 0) return;

        const data = google.visualization.arrayToDataTable(chartData);
        // configure series: first column is the data series, remaining columns are horizontal level references
        const seriesOptions = {};
        const cols = data.getNumberOfColumns();
        // main series style (series 0)
        seriesOptions[0] = { color: '#4be37a', lineWidth: 3, pointSize: 6 };

        // style any additional series as thin dashed reference lines
        for (let c = 1; c < cols; c += 1) {
          seriesOptions[c] = {
            color: 'rgba(200,200,200,0.25)',
            lineWidth: 1,
            pointSize: 0,
            enableInteractivity: false,
            visibleInLegend: false,
            lineDashStyle: [4, 4]
          };
        }

        const options = {
          title: chartTitle || '',
          legend: { position: 'none' },
          backgroundColor: 'transparent',
          chartArea: { left: 70, right: 20, top: 60, bottom: 100, width: '85%', height: '65%' },
          hAxis: {
            title: '',
            slantedText: true,
            slantedTextAngle: 45,
            textStyle: { color: '#c9d1d9' },
            titleTextStyle: { color: '#ffd700' }
          },
          vAxis: {
            minValue: -1.2,
            maxValue: 1.2,
            ticks: [{v:-1,f:'Loss'},{v:0,f:''},{v:1,f:'Win'}],
            textStyle: { color: '#c9d1d9' },
            titleTextStyle: { color: '#ffd700' }
          },
          pointSize: 6,
          lineWidth: 2,
          series: seriesOptions,
          tooltip: {
            textStyle: { color: '#001a00' },
            showColorCode: true,
            isHtml: true
          },
          fontName: 'Roboto'
        };

        const chart = new google.visualization.LineChart(document.getElementById('performanceChart'));
        chart.draw(data, options);
      });
    }

    function buildStreakChartData(profile) {
      const modes = Array.isArray(profile?.currentSeason?.modes) ? profile.currentSeason.modes : [];
      const rows = modes
        .filter((mode) => mode?.streak && typeof mode.streak.count === 'number')
        .map((mode) => {
          const sign = mode.streak.type === 'loss' ? -1 : 1;
          const count = Number(mode.streak.count || 0) * sign;
          return [`${mode.label} ${mode.streak.type === 'win' ? 'Win' : 'Loss'}`, count];
        });

      return rows.length ? [['Mode', 'Streak'], ...rows] : null;
    }

    function buildOutcomeSequenceChartData(profile) {
      const updates = Array.isArray(profile?.updateHistory) ? profile.updateHistory : [];
      if (!updates.length) return null;

      // Reverse to chronological order (oldest first)
      const sequence = updates.slice().reverse().map((u, idx) => {
        const changeStr = String(u.change || '').trim();
        const match = changeStr.match(/-?\d+/);
        const num = match ? Number(match[0]) : null;
        const val = num === null ? 0 : num > 0 ? 1 : num < 0 ? -1 : 0;
        const label = u.updated || `#${idx + 1}`;
        return [label, val];
      });

      return [['Match', 'Outcome'], ...sequence];
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === '') return '—';
      return value;
    }

    function createStatCard(label, value) {
      const card = document.createElement('div');
      card.className = 'stat-card';

      const title = document.createElement('p');
      title.className = 'stat-label';
      title.textContent = label;

      const amount = document.createElement('p');
      amount.className = 'stat-value';
      amount.textContent = formatValue(value);

      card.append(title, amount);
      return card;
    }

    function renderMode(mode) {
      const article = document.createElement('article');
      article.className = 'mode-card';

      // Left: Icon
      const imageWrap = document.createElement('div');
      imageWrap.className = 'mode-image-wrap';
      if (mode.imageUrl) {
        const img = document.createElement('img');
        img.src = mode.imageUrl;
        img.alt = `${mode.label || 'Rank'} icon`;
        img.loading = 'lazy';
        imageWrap.appendChild(img);
      } else {
        imageWrap.textContent = 'No rank image';
      }

      // Right: Info
      const info = document.createElement('div');
      info.style.display = 'flex';
      info.style.flexDirection = 'column';
      info.style.gap = '2px';
      info.style.flex = '1';

      // Top row: Mode name
      const title = document.createElement('h3');
      title.textContent = mode.label || 'Mode';
      info.appendChild(title);

      // Large rating row
      const ratingRow = document.createElement('div');
      ratingRow.style.display = 'flex';
      ratingRow.style.alignItems = 'center';
      ratingRow.style.gap = '12px';

      const rating = document.createElement('span');
      rating.className = 'mode-rating';
      rating.textContent = mode.rating !== undefined && mode.rating !== null ? mode.rating : '—';
      ratingRow.appendChild(rating);

      // Matches played in the rating row
      const matches = document.createElement('span');
      matches.className = 'mode-meta';
      matches.textContent = mode.matchesPlayed !== null && mode.matchesPlayed !== undefined ? `${mode.matchesPlayed} Games` : 'Games: —';
      ratingRow.appendChild(matches);

      info.appendChild(ratingRow);

      // Rank name
      const rankRow = document.createElement('div');
      rankRow.className = 'mode-meta';
      rankRow.textContent = mode.rank || 'Unranked';
      info.appendChild(rankRow);

      // Details: division, streak
      const details = document.createElement('div');
      details.className = 'mode-details';

      const division = document.createElement('span');
      division.textContent = mode.division || 'Division: —';
      details.appendChild(division);

      const streak = document.createElement('span');
      if (mode.streak) {
        streak.textContent = `${mode.streak.type === 'win' ? 'Win' : 'Loss'} Streak: ${mode.streak.count}`;
        streak.style.color = mode.streak.type === 'win' ? '#ffe066' : '#ff5e5e';
      } else {
        streak.textContent = 'Streak: —';
      }
      details.appendChild(streak);

      info.appendChild(details);

      // Compose card
      article.appendChild(imageWrap);
      article.appendChild(info);
      return article;
    }

    function renderRecentMatches(matches) {
      const section = document.createElement('section');
      section.className = 'history-section';

      const heading = document.createElement('h3');
      heading.textContent = 'Recent Matches';
      section.appendChild(heading);

      if (!matches || !matches.length) {
        const fallback = document.createElement('p');
        fallback.className = 'empty-state';
        fallback.textContent = 'No recent matches were found.';
        section.appendChild(fallback);
        return section;
      }

      const tableWrapper = document.createElement('div');
      tableWrapper.className = 'history-table-wrap';

      const table = document.createElement('table');
      table.className = 'history-table';

      const thead = document.createElement('thead');
      thead.innerHTML = `
        <tr>
          <th>Updated</th>
          <th>Playlist</th>
          <th>Matches</th>
          <th>Rating</th>
          <th>Change</th>
        </tr>
      `;
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      matches.slice(0, 12).forEach((match) => {
        const row = document.createElement('tr');
        const changeValue = String(match.change || '').trim();
        const changeNumber = Number(changeValue.replace(/[^\d-]/g, ''));
        const isUp = changeNumber > 0;
        const isDown = changeNumber < 0;

        row.innerHTML = `
          <td>${match.updated || '—'}</td>
          <td>${match.playlist || '—'}</td>
          <td>${match.matches !== null && match.matches !== undefined ? match.matches : '—'}</td>
          <td>${match.rating !== null && match.rating !== undefined ? match.rating : '—'}</td>
        `;

        const changeCell = document.createElement('td');
        changeCell.className = 'history-change-cell';
        changeCell.innerHTML = `<span class="history-change ${isUp ? 'up' : isDown ? 'down' : ''}">${isUp ? '▲ ' : isDown ? '▼ ' : ''}${changeValue || '—'}</span>`;
        row.appendChild(changeCell);
        tbody.appendChild(row);
      });

      table.appendChild(tbody);
      tableWrapper.appendChild(table);
      section.appendChild(tableWrapper);
      return section;
    }

    function renderProfile(accountId) {
      const container = document.getElementById('profileContent');
      const profile = profiles[accountId];

      container.innerHTML = '';

      if (!profile) {
        container.innerHTML = '<p class="empty-state"></p>';
        return;
      }

      const currentSeason = profile.currentSeason || {};
      const totalStats = profile.totalStats || { labels: [], values: [] };

      const header = document.createElement('section');
      header.className = 'account-header';

      const nameWrap = document.createElement('div');
      nameWrap.className = 'name-wrap';

      const heading = document.createElement('h2');
      heading.textContent = profile.displayName || accountId;

      const subtitle = document.createElement('p');
      subtitle.className = 'account-subtitle';
      subtitle.textContent = `${profile.platform || 'Epic'} • Updated ${profile.updated || 'Unknown'}`;

      const currentTag = document.createElement('div');
      currentTag.className = 'current-tag';

      if (currentSeason.reward?.imageUrl) {
        const tagIcon = document.createElement('img');
        tagIcon.src = currentSeason.reward.imageUrl;
        tagIcon.alt = `${currentSeason.reward?.title || 'Season Reward'} icon`;
        tagIcon.className = 'current-tag-icon';
        tagIcon.loading = 'lazy';
        currentTag.appendChild(tagIcon);
      }

      const tagText = document.createElement('span');
      tagText.textContent = `Season Reward: ${currentSeason.reward?.title || 'No season reward'}`;
      currentTag.appendChild(tagText);

      nameWrap.append(heading, subtitle, currentTag);
      header.appendChild(nameWrap);

      const statsSection = document.createElement('section');
      statsSection.className = 'stats-section';
      const statsHeading = document.createElement('h3');
      statsHeading.textContent = 'Total Stats';
      const statsGrid = document.createElement('div');
      statsGrid.className = 'stats-grid';

      if (totalStats.labels.length && totalStats.values.length) {
        totalStats.labels.forEach((label, index) => {
          statsGrid.appendChild(createStatCard(label, totalStats.values[index]));
        });
      } else {
        statsGrid.appendChild(createStatCard('Status', 'No total stats were returned.'));
      }

      statsSection.append(statsHeading, statsGrid);

      const modesSection = document.createElement('section');
      modesSection.className = 'modes-section';
      const modesHeading = document.createElement('h3');
      modesHeading.textContent = 'Rank Stats';
      const modesGrid = document.createElement('div');
      modesGrid.className = 'mode-grid';

      const modes = Array.isArray(currentSeason.modes) ? currentSeason.modes : [];
      if (modes.length) {
        modes.forEach((mode) => modesGrid.appendChild(renderMode(mode)));
      } else {
        const fallback = document.createElement('p');
        fallback.className = 'empty-state';
        fallback.textContent = 'No skill mode data was extracted for this account.';
        modesGrid.appendChild(fallback);
      }

      modesSection.append(modesHeading, modesGrid);
      container.append(header, statsSection, modesSection);

      // Add performance chart: prefer recent match outcomes, fall back to streak counts
      const outcomeChartData = buildOutcomeSequenceChartData(profile);
      const streakChartData = buildStreakChartData(profile);
      if (outcomeChartData && outcomeChartData.length > 1) {
        const chartSection = document.createElement('section');
        chartSection.className = 'chart-section';
        const chartHeading = document.createElement('h3');
        chartHeading.textContent = 'Recent Match Outcomes';
        const chartContainer = document.createElement('div');
        chartContainer.id = 'performanceChart';
        chartContainer.style.width = '100%';
        chartContainer.style.height = '420px';
        chartSection.append(chartHeading, chartContainer);
        container.appendChild(chartSection);
        drawPerformanceChart(outcomeChartData, '');
      } else if (streakChartData && streakChartData.length > 0) {
        const chartSection = document.createElement('section');
        chartSection.className = 'chart-section';
        const chartHeading = document.createElement('h3');
        chartHeading.textContent = 'Current Win / Loss Streaks';
        const chartContainer = document.createElement('div');
        chartContainer.id = 'performanceChart';
        chartContainer.style.width = '100%';
        chartContainer.style.height = '420px';
        chartSection.append(chartHeading, chartContainer);
        container.appendChild(chartSection);
        drawPerformanceChart(streakChartData, 'Current Win / Loss Streaks');
      }

      if (profile.updateHistory && profile.updateHistory.length > 0) {
        container.appendChild(renderRecentMatches(profile.updateHistory));
      }
    }

    async function loadProfiles() {
      const apiBase = window.location.hostname === 'localhost' && window.location.port === '8000'
        ? 'http://localhost:3000'
        : '';

      setStatus('');
      renderTabs();
      renderProfile(activeAccount);

      try {
        const results = await Promise.allSettled(
          accountIds.map(async (accountId) => {
            const response = await fetch(`${apiBase}/api/stats/${accountId}`);
            const payload = await response.json();

            if (!response.ok || !payload.profile) {
              throw new Error(payload.error || `Failed to load ${accountId}`);
            }

            return { accountId, profile: payload.profile };
          })
        );

        results.forEach((result) => {
          if (result.status === 'fulfilled') {
            profiles[result.value.accountId] = result.value.profile;
          }
        });

        const failures = results.filter((result) => result.status === 'rejected');
        if (failures.length) {
          setStatus(`Loaded ${results.length - failures.length} of ${results.length} accounts. Some profiles could not be fetched.`);
        } else {
          setStatus('');
        }

        renderProfile(activeAccount);
      } catch (error) {
        setStatus('Unable to load tracked accounts right now.');
        renderProfile(activeAccount);
      }
    }

    window.addEventListener('DOMContentLoaded', loadProfiles);
  </script>
</body>
</html>
